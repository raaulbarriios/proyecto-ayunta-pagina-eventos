<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Algeciras | Ayuntamiento de Algeciras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="mainHeader" class="main-header">
        <div class="header-container">
            <div class="header-logo">
                <img src="logos/logoayunt.png" alt="Ayuntamiento de Algeciras" class="main-logo">
            </div>

            <div class="desktop-search">
                <div class="search-input-wrapper-official">
                    <input type="text" id="searchInputDesktop" placeholder="Texto a buscar" aria-label="Buscar">
                    <button id="searchButtonDesktop" class="searchButtonOfficial">
                        <svg class="search-icon-svg-small" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <span>Buscar</span>
                    </button>
                </div>
            </div>
            
            <div class="header-actions">
                <button id="mobileSearchBtn" class="square-btn search-btn" aria-label="Abrir búsqueda">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Full-width mobile search bar -->
        <div id="mobileSearchPanel" class="mobile-search-panel">
            <div class="search-input-wrapper-official">
                <input type="text" id="searchInput" placeholder="Texto a buscar" aria-label="Buscar">
                <button id="searchButtonOfficial" class="searchButtonOfficial">
                    <svg class="search-icon-svg-small" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>Buscar</span>
                </button>
            </div>
        </div>
    </header>

    <main id="mainContent">
        <section id="heroSection">
            <div class="hero-container">
                <h1 id="pageTitle">Eventos Disponibles</h1>
            </div>
        </section>

        <div id="layoutWrapper" class="layout-wrapper">
            <section id="eventsSection" class="events-section">
                <div class="section-header">
                    <h2 id="sectionTitle">Eventos Destacados</h2>
                    <div class="view-options">
                        <!-- Opciones futuras de vista -->
                    </div>
                </div>
                <div id="eventsGrid" class="events-grid">
                    <!-- Los eventos se cargarán aquí mediante main.js -->
                    <div class="loading-state">Cargando eventos...</div>
                </div>
            </section>
        </div>
    </main>

    <footer id="mainFooter" class="main-footer">
        <div class="footer-container">
            <div class="footer-left">
                <img src="logos/Logo Algeciras 1 tinta fondos oscuros sin letras interiores.png" alt="Logo" class="footer-mini-logo">
                <span class="footer-social-name">ayuntamientoalgeciras</span>
            </div>
            <div class="footer-right">
                <span>© Ayuntamiento de Algeciras</span>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
