<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Evento | Algeciras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container {
            max-width: 900px;
            margin: 2rem auto;
            background: var(--white);
            border-radius: var(--borderRadius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .detail-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }
        .detail-content {
            padding: 2rem;
        }
        .detail-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }
        .detail-category {
            background: var(--accentColor);
            color: var(--darkBlue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .detail-title {
            font-size: 2.5rem;
            color: var(--primaryColor);
            margin-bottom: 1rem;
        }
        .detail-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            background: var(--lightBg);
            padding: 1.5rem;
            border-radius: var(--borderRadius);
        }
        .info-item h4 {
            color: var(--primaryColor);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .info-item p {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .detail-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #444;
            margin-bottom: 2rem;
        }
        .detail-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: var(--primaryColor);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--darkBlue);
        }
        .btn-outline {
            border: 2px solid var(--primaryColor);
            color: var(--primaryColor);
        }
        .btn-outline:hover {
            background: var(--primaryColor);
            color: var(--white);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--primaryColor);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header id="mainHeader" class="main-header">
        <div class="header-container">
            <div class="header-logo">
                <img src="logos/logoayunt.png" alt="Ayuntamiento de Algeciras" class="main-logo">
            </div>
        </div>
    </header>

    <main class="layout-wrapper">
        <div class="detail-container" id="eventDetailContent">
            <div class="loading-state" style="padding: 4rem; text-align: center;">Cargando detalles del evento...</div>
        </div>
    </main>

    <footer id="mainFooter" class="main-footer">
        <div class="footer-container">
            <div class="footer-left">
                <img src="logos/Logo Algeciras 1 tinta fondos oscuros sin letras interiores.png" alt="Logo" class="footer-mini-logo">
                <span class="footer-social-name">ayuntamientoalgeciras</span>
            </div>
            <div class="footer-right">
                <span>© Ayuntamiento de Algeciras</span>
            </div>
        </div>
    </footer>

    <script src="detail.js"></script>
</body>
</html>
